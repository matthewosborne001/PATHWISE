<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer 2 — Weekly Intelligence System</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:linear-gradient(135deg,#0f1f3d,#1c2f57);
  color:white;
}

.frame{
  border:2px solid #d4af37;
  border-radius:25px;
  margin:15px;
  min-height:calc(100vh - 30px);
  padding:60px 40px;
}

h1{
  text-align:center;
  font-size:42px;
  margin-bottom:20px;
}

.stress{
  text-align:center;
  margin-bottom:50px;
  font-size:20px;
}

.badge{
  display:inline-block;
  padding:8px 16px;
  border-radius:20px;
  font-weight:bold;
}

.green{ background:#2ecc71; }
.yellow{ background:#f1c40f; }
.red{ background:#c0392b; }

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:18px;
}

.card h2{
  color:#f4b942;
  margin-bottom:20px;
}

.bar{
  margin-bottom:15px;
}

.bar-fill{
  height:10px;
  background:linear-gradient(45deg,#f4b942,#e0a22f);
  border-radius:5px;
}

.alert{
  margin-bottom:10px;
  font-size:14px;
}

.back{
  text-align:center;
  margin-top:50px;
}

.back a{
  color:#f4b942;
  text-decoration:none;
}

.alert-red{
  background: rgba(192,57,43,0.2);
  border-left: 4px solid #e74c3c;
  padding:8px;
  border-radius:6px;
}

.alert-yellow{
  background: rgba(241,196,15,0.2);
  border-left: 4px solid #f1c40f;
  padding:8px;
  border-radius:6px;
}

/* ADDED: critical styling */
.alert-critical{
  background: rgba(231,76,60,0.35);
  border-left: 4px solid #ff0000;
  padding:8px;
  border-radius:6px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="frame">

<h1>
  <span style="color:#f4b942;">Weekly Intelligence</span><br>
  <span style="font-weight:300;">System</span>
</h1>

<div class="stress">
  Weekly Stress Index:
  <span id="stressBadge" class="badge">Calculating...</span>
</div>

<div class="grid">

  <div class="card">
    <h2>Weekly Distribution</h2>
    <div id="weeklyBars"></div>
  </div>

  <div class="card">
    <h2>Overload Analysis</h2>
    <div id="alerts"></div>
  </div>

</div>

<div class="back">
  <a href="plus.html">← Back to Plus</a>
</div>

</div>

<script>

/* SAFE STORAGE READ */
function safeParse(key){
  try{
    return JSON.parse(localStorage.getItem(key)) || {};
  }catch{
    return {};
  }
}

/* 🔧 ADDED: time formatter */
function formatStudyTime(hours){
  const h = Math.floor(hours);
  const m = Math.round((hours - h) * 60);

  if(h === 0) return m + " min";
  if(m === 0) return h + "h";
  return h + "h " + m + "min";
}

/* CALENDAR SYNC */

const unavailable = safeParse("unavailableDays");

const today = new Date();
let monday = new Date(today);

let day = monday.getDay();
let diff = monday.getDate() - day + (day === 0 ? -6 : 1);
monday.setDate(diff);

const weekHours = [];

for(let i = 0; i < 7; i++){

  let d = new Date(monday);
  d.setDate(monday.getDate() + i);

  let key =
  d.getFullYear() + "-" +
  String(d.getMonth() + 1).padStart(2,"0") + "-" +
  String(d.getDate()).padStart(2,"0");

  if(unavailable[key]){
    weekHours.push(0);
  }else{
    weekHours.push(1);
  }

}

function loadWeeklyData(){

  const assessments = safeParse("assessments");

  const weeklyBars = document.getElementById("weeklyBars");
  const alerts = document.getElementById("alerts");
  let collisionAlerts = [];
  const stressBadge = document.getElementById("stressBadge");

  weeklyBars.innerHTML = "";
  alerts.innerHTML = "";

  if(!Array.isArray(assessments) || assessments.length === 0){
    weeklyBars.innerHTML = "No assessments saved.";
    stressBadge.textContent = "0%";
    stressBadge.className = "badge green";
    return;
  }

  let totalDaily = 0;

  assessments.forEach(a=>{
    let val = parseFloat(a.dailyStudy);
    if(!isNaN(val) && val > 0){
      totalDaily += val;
    }
  });

  let dailyDistribution = [0,0,0,0,0,0,0];

  assessments.forEach(a => {

    let daily = parseFloat(a.dailyStudy);
    if(isNaN(daily) || daily <= 0) return;

    let daysLeft = parseInt(a.daysUntil);
    if(isNaN(daysLeft) || daysLeft <= 0) daysLeft = 1;
    if(daysLeft > 7) daysLeft = 7;

    let availableDays = 0;

    for(let i = 0; i < daysLeft; i++){
      if(weekHours[i] !== 0){
        availableDays++;
      }
    }

    if(availableDays === 0) return;

    let distributed = daily;

    for(let i = 0; i < daysLeft; i++){
      if(weekHours[i] !== 0){
        dailyDistribution[i] = Math.max(dailyDistribution[i], distributed);
      }
    }

  });

// DETECT MULTI-ASSESSMENT COLLISIONS
for(let i = 0; i < 7; i++){

  let count = 0;

  assessments.forEach(a => {
    let daysLeft = a.daysUntil || 7;
    if(daysLeft > 7) daysLeft = 7;

    if(i < daysLeft){
      count++;
    }
  });

  if(count >= 3){

    let dayName = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"][i];

    let existingOverload = collisionAlerts.find(a => 
      a.type === "overload" && a.day === dayName
    );

    if(existingOverload){
      collisionAlerts.push({
        type: "critical",
        day: dayName,
        count: count,
        hours: existingOverload.hours
      });
    }
    else{
      collisionAlerts.push({
        type: "collision",
        day: dayName,
        count: count
      });
    }

  }

}

const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

days.forEach((day,i)=>{

  let hours = dailyDistribution[i];

  const barContainer = document.createElement("div");
  barContainer.className = "bar";

  let width = Math.min(hours * 10, 100);

  barContainer.innerHTML = `${day} – ${formatStudyTime(hours)}
  <div class="bar-fill" style="width:${width}%"></div>`;

  weeklyBars.appendChild(barContainer);

  if(hours > 4){
    collisionAlerts.push({
      type: "overload",
      day: day,
      hours: hours
    });
  }

});

const stressPercent = Math.min((totalDaily / 4) * 100, 200);

// RENDER COLLISION ALERTS
collisionAlerts.forEach(alertData => {

  const alert = document.createElement("div");
  alert.className = "alert";

  if(alertData.type === "overload"){
    alert.classList.add("alert-red");
  }
  else if(alertData.type === "collision"){
    alert.classList.add("alert-yellow");
  }
  else if(alertData.type === "critical"){
    alert.classList.add("alert-critical");
  }

  if(alertData.type === "overload"){
    alert.textContent = "⚠ " + alertData.day + " overloaded (" + formatStudyTime(alertData.hours) + ")";
  }
  else if(alertData.type === "collision"){
    alert.textContent = "⚠ " + alertData.day + " has " + alertData.count + " overlapping assessments";
  }
  else if(alertData.type === "critical"){
    alert.textContent = "🚨 " + alertData.day + " CRITICAL: overload + " + alertData.count + " assessments";
  }

  alerts.appendChild(alert);

});

if(stressPercent < 60){
  stressBadge.textContent = "Controlled (" + stressPercent.toFixed(0) + "%)";
  stressBadge.className = "badge green";
}
else if(stressPercent < 100){
  stressBadge.textContent = "Elevated (" + stressPercent.toFixed(0) + "%)";
  stressBadge.className = "badge yellow";
}
else{
  stressBadge.textContent = "Critical (" + stressPercent.toFixed(0) + "%)";
  stressBadge.className = "badge red";
}

}

loadWeeklyData();

</script>

</body>
</html>
