<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academic Planner</title>

<style>
.subtitle{
text-align:center;
margin-top:10px;
margin-bottom:40px;
color:#d5dbea;
font-size:16px;
}  
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f1f3d,#1c2f57);
color:white;
}

.frame{
border:2px solid #d4af37;
border-radius:25px;
margin:15px;
min-height:calc(100vh - 30px);
padding:60px 40px;
}

h1{
text-align:center;
font-size:42px;
margin-bottom:50px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:18px;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
background:rgba(255,255,255,0.08);
}

.card h2{
color:#f4b942;
margin-bottom:10px;
}

.back{
text-align:center;
margin-top:50px;
}

.back a{
color:#f4b942;
text-decoration:none;
}

/* ACTIVE LIST */

.assessment{
border-top:1px solid rgba(255,255,255,0.1);
padding-top:12px;
margin-top:12px;
position:relative;
}

.assessment-title{
font-weight:bold;
}

.delete-btn{
position:absolute;
right:0;
top:0;
cursor:pointer;
color:#ff6b6b;
font-weight:bold;
}

.edit-btn{
position:absolute;
right:25px;
top:0;
cursor:pointer;
color:#f4b942;
font-weight:bold;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:#1c2f57;
padding:40px;
border-radius:20px;
width:350px;
position:relative;
}

.modal-content input{
width:100%;
padding:10px;
margin-bottom:15px;
border:none;
border-radius:8px;
}

.modal-content button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#f4b942,#e0a22f);
color:white;
cursor:pointer;
}

.close{
position:absolute;
top:10px;
right:15px;
cursor:pointer;
font-size:20px;
}

</style>
</head>

<body>

<div class="frame">

<h1>Academic <span class="gold">Planner</span></h1>
<p class="subtitle">Build realistic study plans and manage upcoming assessments.</p>

<div class="grid">

<div class="card add-card" onclick="openModal()">
<h2>Add Assessment</h2>
<p>Create a realistic study plan based on age and difficulty.</p>
</div>

<div class="card">
<h2>Active Assessments</h2>
<div id="activeList"></div>
</div>

<div class="card">
<h2>Study Guidance</h2>
<p id="studyAdvice">Analyzing your study workload...</p>
</div>

<div class="card">
<h2>Risk & Collision Alerts</h2>
<p>(Coming soon)</p>
</div>

</div>

<div class="back">
<a href="plus.html">← Back to Plus</a>
</div>

</div>


<div class="modal" id="modal">
<div class="modal-content">

<span class="close" onclick="closeModal()">×</span>

<h3 style="margin-bottom:20px;">Add Assessment</h3>

<input id="testName" placeholder="Test Name">
<input id="age" type="number" placeholder="Age">
<input id="days" type="number" placeholder="Days Until Test">
<input id="difficulty" type="number" placeholder="Difficulty (1-10)">

<button onclick="saveAssessment()">Save Assessment</button>

</div>
</div>


<script>

let editingIndex = null

function formatStudyTime(hours){

const h = Math.floor(hours);
const m = Math.round((hours - h) * 60);

if(h === 0) return m + " min";
if(m === 0) return h + "h";

return h + "h " + m + "min";

}

function openModal(){
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function saveAssessment(){

const name=document.getElementById("testName").value
const age=parseInt(document.getElementById("age").value)
const days=parseInt(document.getElementById("days").value)
const difficulty=parseInt(document.getElementById("difficulty").value)

if(!name||!age||!days||!difficulty) return

let baseHours

if(age<=12) baseHours=0.8
else if(age<=14) baseHours=1.2
else if(age<=16) baseHours=1.8
else baseHours=2.5

let dailyStudy=(baseHours*difficulty)/days

if(dailyStudy>4) dailyStudy=4

const assessment={
name,
difficulty,
dailyStudy:dailyStudy.toFixed(1)
}

let list=JSON.parse(localStorage.getItem("assessments"))||[]

if(editingIndex !== null){
list[editingIndex] = assessment
editingIndex = null
}else{
list.push(assessment)
}

localStorage.setItem("assessments",JSON.stringify(list))

closeModal()

loadAssessments()
updateStudyAdvice()

}

function deleteAssessment(index){

let list=JSON.parse(localStorage.getItem("assessments"))||[]

list.splice(index,1)

localStorage.setItem("assessments",JSON.stringify(list))

loadAssessments()
updateStudyAdvice()

}

function loadAssessments(){

const container=document.getElementById("activeList")

container.innerHTML=""

let list=JSON.parse(localStorage.getItem("assessments"))||[]

if(list.length===0){

container.innerHTML="No active assessments"

return

}

list.forEach((a,i)=>{

const div=document.createElement("div")

div.className="assessment"

div.innerHTML=`

<div class="assessment-title">${a.name}</div>
<div class="edit-btn" onclick="editAssessment(${i})">✏</div>
<div class="delete-btn" onclick="deleteAssessment(${i})">×</div>

Daily Study: ${a.dailyStudy}h<br>
Difficulty: ${a.difficulty}/10

`

container.appendChild(div)

})

}

function updateStudyAdvice(){

const assessments = JSON.parse(localStorage.getItem("assessments")) || [];
const advice = document.getElementById("studyAdvice");

if(!advice) return;

if(assessments.length === 0){
advice.textContent = "Add an assessment to receive a recommended study plan.";
return;
}

let totalDaily = 0;

assessments.forEach(a=>{
totalDaily += parseFloat(a.dailyStudy);
});

if(totalDaily < 1.5){
advice.textContent = "Your workload is light. Around " + totalDaily.toFixed(1) + " hours per day is healthy.";
}
else if(totalDaily < 3){
advice.textContent = "Your workload is balanced. Around " + totalDaily.toFixed(1) + " hours per day should keep you on track.";
}
else if(totalDaily < 4){
advice.textContent = "Your workload is heavy. Consider spreading study sessions across more days.";
}
else{
advice.textContent = "Your workload may be unhealthy. Try reducing study hours or increasing available study days.";
}

}

function editAssessment(index){

let list = JSON.parse(localStorage.getItem("assessments")) || []

editingIndex = index

document.getElementById("testName").value = list[index].name
document.getElementById("difficulty").value = list[index].difficulty

openModal()

}

loadAssessments()
updateStudyAdvice()

</script>

</body>
</html>
